<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
    <style>
        table {
            background-color: yellow;
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }

        table, th, tr, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        caption {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Student Details</caption>
        
        <tr>
            <th>NAME</th>
            <th>AGE</th>
            <th>BRANCH</th>
        </tr>

        <tr>
            <td>Adil</td>
            <td>21</td>
            <td>CSE</td>
        </tr>
        <tr>
            <td>Shaw</td>
            <td>20</td>
            <td>ECE</td>
        </tr>

    </table>

</body>
</html>
